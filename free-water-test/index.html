    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito Sans', sans-serif; color: #2d2d2d; background: #F5EDE3; line-height: 1.6; }

    .brand-header {

    .container { max-width: 640px; margin: 0 auto; padding: 32px 20px 60px; }

    .step { background: #fff; border-radius: 14px; padding: 22px 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .step__number { display: inline-block; background: #5BA4C9; color: #fff; width: 26px; height: 26px; border-radius: 50%; text-align: center; line-height: 26px; font-weight: 700; font-size: 14px; margin-right: 8px; }
    .step__title { font-weight: 700; font-size: 16px; color: #1a1a2e; display: inline; }
    .step__hint { font-size: 12px; color: #999; margin-top: 4px; }

    .options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .option { flex: 1; min-width: 100px; }
    .option input { display: none; }
    .option label { display: block; padding: 12px 14px; border: 2px solid #e5e5e5; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .option input:checked + label { border-color: #5BA4C9; background: rgba(91,164,201,0.08); color: #1a1a2e; }

    .checks { margin-top: 14px; }
    .check { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 2px solid #e5e5e5; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }

    .text-input:focus { border-color: #5BA4C9; outline: none; }

    /* Qualified banner - hidden until all questions answered, then animates in */
    .qualified {
      display: none; opacity: 0; max-height: 0; margin: 0;
      background: linear-gradient(135deg, #4CAF50 0%, #43a047 100%);
      color: #fff; padding: 0 20px; border-radius: 14px;
      text-align: center; font-weight: 700; font-size: 16px;
      box-shadow: 0 6px 20px rgba(76,175,80,0.25);
      overflow: hidden; transform: scale(0.95);
      transition: opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease, margin 0.5s ease, transform 0.5s ease;
      position: relative;
    }
    .qualified__brand {
      position: absolute; top: 14px; right: 16px;
      background: #fff; padding: 8px 12px; border-radius: 8px;

    @media (max-width: 480px) {
      .qualified__brand { top: 10px; right: 10px; padding: 6px 10px; }
      .qualified__brand img { height: 28px; }
    }
    .qualified.show {
      display: block; opacity: 1; max-height: 200px; padding: 20px;
      margin: 24px 0; transform: scale(1);
      animation: pulseGlow 2s ease-in-out 0.6s;
    }
    .qualified__icon {
      display: inline-block; width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.25); line-height: 32px;
      margin-bottom: 10px; font-size: 18px;
    }
    .qualified__sub { font-size: 13px; font-weight: 500; opacity: 0.95; margin-top: 6px; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 6px 20px rgba(76,175,80,0.25); }
      50% { box-shadow: 0 10px 40px rgba(76,175,80,0.55); }
    }
    /* Progress indicator */
    .progress-track {

      background: #F5EDE3; padding: 10px 20px 6px; margin: -32px -20px 20px;
    }
    .progress-bar {
      height: 6px; background: rgba(0,0,0,0.08); border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #5BA4C9 0%, #4CAF50 100%);
      width: 0%; border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-label {

    }
    /* Contact & calendar sections start hidden */
    .contact-section, .calendar-section, .submit-section {
      display: none; opacity: 0; max-height: 0; overflow: hidden;
      transition: opacity 0.5s ease, max-height 0.6s ease;
    }
    .contact-section.show, .calendar-section.show, .submit-section.show {
      display: block; opacity: 1; max-height: 2000px;

    .calendar { background: #fff; border-radius: 14px; padding: 20px; margin-top: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .calendar__title { font-weight: 700; font-size: 15px; margin-bottom: 14px; color: #1a1a2e; text-align: center; }
    .cal-month { text-align: center; font-size: 13px; color: #666; margin-bottom: 10px; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
    .cal-day-label { text-align: center; font-size: 11px; color: #999; font-weight: 700; padding: 4px 0; }
    .cal-day { text-align: center; padding: 10px 0; font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .cal-day:hover:not(.disabled) { background: rgba(91,164,201,0.1); }
    .cal-day.disabled { color: #ccc; cursor: not-allowed; }
    .cal-day.selected { background: #5BA4C9; color: #fff; font-weight: 700; }
    .cal-day.empty { cursor: default; }

    .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .time-slot { padding: 10px; border: 2px solid #e5e5e5; border-radius: 8px; text-align: center; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
    .time-slot:hover { border-color: #5BA4C9; }
    .time-slot.selected { background: #5BA4C9; color: #fff; border-color: #5BA4C9; }

    .submit-btn { width: 100%; padding: 16px; background: #E8944A; color: #fff; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 20px; transition: background 0.3s; }

    .consent-text { font-size: 11px; color: #888; line-height: 1.5; margin-top: 16px; padding: 14px; background: rgba(91,164,201,0.06); border-radius: 10px; border-left: 3px solid #5BA4C9; }

    .success { display: none; text-align: center; padding: 60px 20px; background: #fff; border-radius: 14px; }

    .footer { text-align: center; padding: 24px 20px; font-size: 12px; color: #999; }
    .footer a { color: #5BA4C9; }
  </style>
</head>

  <script>
    // Language toggle
    function setLang(lang) {
      document.querySelectorAll('[data-en][data-es]').forEach(function(el) {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
      document.documentElement.lang = lang;
    }
    try { localStorage.removeItem('azwc-lang'); } catch(e) {}
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('lang') === 'es') { setLang('es'); } else { setLang('en'); }
  </script>
